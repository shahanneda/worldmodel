<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finger Skeleton Recorder</title>
    <link rel="stylesheet" href="styles.css?v=20260313-2" />
  </head>
  <body>
    <main>
      <header>
        <h1>Finger Skeleton Recorder</h1>
        <p>Records a configurable clip with hand skeleton landmarks.</p>
      </header>

      <section class="controls">
        <button id="startCamera">Start Camera</button>
        <label class="field" for="durationSeconds">
          <span>Duration (s)</span>
          <input
            id="durationSeconds"
            type="number"
            min="1"
            max="600"
            step="1"
            value="10"
          />
        </label>
        <button id="recordClip" disabled>Record 10s</button>
        <span id="status">Idle</span>
      </section>

      <section class="stage">
        <div class="video-wrap">
          <video id="video" playsinline muted></video>
          <canvas id="composite"></canvas>
          <canvas id="overlay"></canvas>
        </div>
        <aside class="data-panel">
          <h2>Live data</h2>
          <canvas id="sparkline" width="320" height="120"></canvas>
          <pre id="liveData">No frames yet</pre>
        </aside>
      </section>

      <section class="tips">
        <p>Tip: Move one finger up and down in front of the camera for clear tracking.</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.min.js"></script>
    <script src="app.js?v=20260313-2"></script>
  </body>
</html>
