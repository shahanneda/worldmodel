# Single-dataset baseline config for the config-driven training workflow.

config_schema: 1
VERSION: finger_xy_baseline_v1

experiment:
  run_name: coord_to_image_unet
  description: Baseline coordinate-to-image training on the processed finger dataset.
  tags:
    - baseline
    - coord-to-image

paths:
  checkpoint_root: model/checkpoints
  split_root: model/splits
  artifact_root: model/artifacts

data:
  datasets:
    - name: january30_clip
      processed_dir: data/processed-finger-sam-2026-01-30T22-41-47-949Z
  normalized_coords: true
  drop_missing: true
  drop_quality_flagged: true
  require_finger: true
  require_shirt: true
  min_shirt_confidence: 0.0
  min_shirt_sample_count: 1500

splits:
  val_fraction: 0.1
  test_fraction: 0.1
  seed: 42
  persist: true
  reuse_existing: true

loader:
  batch_size: 4
  num_workers: 0
  pin_memory: true
  shuffle_train: true

model:
  kind: coord_to_image_unet
  image_size: 64
  coord_dim: 2
  base_channels: 16
  latent_channels: 128
  bottleneck_size: 8

training:
  device: auto
  epochs: 25
  lr: 0.001
  amp: auto
  resume:
    mode: never

checkpointing:
  save_final: true
  save_best: false
  keep_history: true
  filename_template: "{checkpoint_id}_{VERSION}_{run_name}_{timestamp}.pt"

reproducibility:
  seed: 42
  enforce_determinism: false
  capture_git_state: true
  save_resolved_config: true
  save_split_artifact: true

notebook:
  visualize_dataset_summary: true
  visualize_split_summary: true
  visualize_samples: 8

wandb:
  enabled: true
  project: worldmodel
  mode: online
  job_type: train
  tags:
    - yaml-config
    - validation-previews
  log_code: true
  log_model_artifact: true
  log_config_artifact: true
  validation_sample_count: 8
  log_validation_every_n_epochs: 1
