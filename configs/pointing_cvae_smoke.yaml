# Small smoke-test config for validating the end-to-end latent training path.

config_schema: 1
VERSION: finger_xy_cvae_smoke_v1

experiment:
  run_name: pointing_cvae
  description: Small config for quick end-to-end CVAE training verification.
  tags:
    - smoke
    - cvae
    - coord-to-image

paths:
  checkpoint_root: model/checkpoints
  split_root: model/splits
  artifact_root: model/artifacts

data:
  datasets:
    - name: january30_clip
      processed_dir: data/processed-finger-sam-2026-01-30T22-41-47-949Z
  normalized_coords: true
  coord_space: minus_one_to_one
  drop_missing: true
  drop_quality_flagged: true
  require_finger: true
  require_shirt: true
  min_shirt_confidence: 0.0
  min_shirt_sample_count: 1500

splits:
  val_fraction: 0.1
  test_fraction: 0.1
  seed: 42
  persist: true
  reuse_existing: true

loader:
  batch_size: 4
  num_workers: 0
  pin_memory: true
  shuffle_train: true

model:
  kind: pointing_cvae
  image_size: 32
  coord_dim: 2
  base_channels: 8
  latent_channels: 48
  bottleneck_size: 8
  latent_dim: 16
  posterior_base_channels: 16
  prior_hidden_dim: 64

training:
  device: auto
  epochs: 1
  lr: 0.0002
  amp: auto
  optimizer: adamw
  weight_decay: 0.0001
  grad_accum_steps: 2
  grad_clip_norm: 1.0
  recon_mse_weight: 0.1
  kl_beta_max: 0.001
  kl_beta_warmup_steps: 5000
  prior_sample_temperature: 0.7
  resume:
    mode: never

checkpointing:
  save_final: true
  save_best: false
  keep_history: true
  filename_template: "{checkpoint_id}_{VERSION}_{run_name}_{timestamp}.pt"

reproducibility:
  seed: 42
  enforce_determinism: false
  capture_git_state: true
  save_resolved_config: true
  save_split_artifact: true

notebook:
  visualize_dataset_summary: true
  visualize_split_summary: true
  visualize_samples: 4

wandb:
  enabled: true
  project: worldmodel
  mode: online
  job_type: train
  tags:
    - yaml-config
    - validation-previews
    - smoke
    - cvae
  log_code: true
  log_model_artifact: true
  log_config_artifact: true
  validation_sample_count: 4
  log_validation_every_n_epochs: 1
  validation_prior_sample_count: 2
  validation_prior_temperature: 0.7
